<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S0l0pp Board</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(-45deg, #0a0a0a, #111, #1a1a1a, #000);
    background-size: 400% 400%;
    animation: bgMove 20s ease infinite;
    color: #ddd;
    min-height: 100vh;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

header {
    background: #111;
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid #333;
}

h1 {
    font-size: 2rem;
    letter-spacing: 2px;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.form-box {
    background: #111;
    padding: 20px;
    border: 1px solid #333;
    margin-bottom: 30px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    background: #000;
    border: 1px solid #333;
    color: #ddd;
}

button {
    padding: 8px 15px;
    background: #222;
    border: 1px solid #444;
    color: #ddd;
    cursor: pointer;
}

button:hover {
    background: #333;
}

.thread {
    background: #111;
    padding: 15px;
    border: 1px solid #333;
    margin-bottom: 20px;
}

.post {
    margin-top: 10px;
    padding: 10px;
    background: #0d0d0d;
    border-left: 3px solid #444;
}

.meta {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 5px;
}
</style>
</head>
<body>

<header>
    <h1>/s0/ - S0l0pp Board</h1>
</header>

<div class="container">

<div class="form-box">
    <h3>Create Thread</h3>
    <input type="text" id="name" placeholder="Name (leave empty = Anonymous)">
    <input type="text" id="title" placeholder="Thread title">
    <textarea id="content" placeholder="Write something..."></textarea>
    <button onclick="createThread()">Post Thread</button>
</div>

<div id="board"></div>

</div>

<script>

function getStoredName() {
    return localStorage.getItem("persistentName") || "";
}

document.getElementById("name").value = getStoredName();

function saveName(name) {
    if(name.trim() !== "") {
        localStorage.setItem("persistentName", name);
    }
}

function createThread() {
    const nameInput = document.getElementById("name");
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    let name = nameInput.value.trim() || "Anonymous";

    if(title === "" || content === "") return;

    saveName(nameInput.value);

    let threads = JSON.parse(localStorage.getItem("threads")) || [];

    const thread = {
        id: Date.now(),
        title,
        posts: [{
            name,
            content,
            date: new Date().toLocaleString()
        }]
    };

    threads.unshift(thread);
    localStorage.setItem("threads", JSON.stringify(threads));

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
    loadBoard();
}

function reply(threadId) {
    const replyContent = document.getElementById("reply-"+threadId).value.trim();
    const nameInput = document.getElementById("name");
    let name = nameInput.value.trim() || "Anonymous";

    if(replyContent === "") return;

    saveName(nameInput.value);

    let threads = JSON.parse(localStorage.getItem("threads")) || [];
    const thread = threads.find(t => t.id === threadId);

    thread.posts.push({
        name,
        content: replyContent,
        date: new Date().toLocaleString()
    });

    localStorage.setItem("threads", JSON.stringify(threads));
    loadBoard();
}

function loadBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";

    let threads = JSON.parse(localStorage.getItem("threads")) || [];

    threads.forEach(thread => {
        const threadDiv = document.createElement("div");
        threadDiv.className = "thread";

        threadDiv.innerHTML = `<strong>${thread.title}</strong>`;

        thread.posts.forEach(post => {
            const postDiv = document.createElement("div");
            postDiv.className = "post";
            postDiv.innerHTML = `
                <div class="meta">${post.name} | ${post.date}</div>
                <div>${post.content}</div>
            `;
            threadDiv.appendChild(postDiv);
        });

        threadDiv.innerHTML += `
            <textarea id="reply-${thread.id}" placeholder="Reply..."></textarea>
            <button onclick="reply(${thread.id})">Reply</button>
        `;

        board.appendChild(threadDiv);
    });
}

loadBoard();

</script>

</body>
</html>
